name: Commit changes and create a PR
description: "Commit changes and create a PR"
inputs:
  branch:
    description: "Branch name"
    required: true
  title:
    description: "PR title"
    required: true
  body:
    description: "PR body"
    required: false
    default: ""
  changes:
    description: "Whether there are changes"
    required: false
    default: "false"
  auto-merge:
    description: "Enable auto-merge"
    required: false
    default: "true"
  bot-token:
    description: "GitHub bot token"
    required: true
runs:
  using: composite
  steps:
    - id: check-changes
      shell: bash
      run: |
        if git diff --stat | grep -q .; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Check and cleanup existing branch/PR
      if: inputs.title != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot-token }}
      run: |
        BRANCH="${{ inputs.branch }}"

        if git ls-remote --heads origin "$BRANCH" | grep -q .; then
          echo "Branch exists, checking for PR..."

          PR_JSON=$(gh pr view "$BRANCH" --json number,state 2>/dev/null || echo '{}')
          if echo "$PR_JSON" | jq -r '.state' 2>/dev/null | grep -q "OPEN"; then
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            echo "Closing existing PR #$PR_NUM"
            gh pr close "$PR_NUM"
          fi

          echo "Deleting branch $BRANCH"
          git push origin --delete "$BRANCH"
        fi

    - name: Commit and push
      if: (inputs.changes == 'true' || steps.check-changes.outputs.has_changes) && inputs.title != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot-token }}
      run: |
        git checkout -b ${{ inputs.branch }}
        git add .
        git commit -m "${{ inputs.title }}"
        git push -u origin ${{ inputs.branch }}

    - name: Create PR
      if: (inputs.changes == 'true' || steps.check-changes.outputs.has_changes) && inputs.title != ''
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot-token }}
      run: |
        PR_URL=$(gh pr create \
          --base main \
          --head ${{ inputs.branch }} \
          --title "${{ inputs.title }}" \
          --body "${{ inputs.body }}" \
          --label "automated,dependencies")
        echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

    - name: Enable auto-merge
      if: inputs.auto-merge == 'true' && inputs.title != '' && (inputs.changes == 'true' || steps.check-changes.outputs.has_changes)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.bot-token }}
      run: |
        gh pr merge ${{ steps.create-pr.outputs.pr_url }} --auto
