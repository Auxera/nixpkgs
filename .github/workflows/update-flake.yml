name: Update Flake

on:
    workflow_call:
        inputs:
            packages:
                description: "Space-separated package names"
                required: false
                type: string
                default: ""
            inputs:
                description: "Space-separated flake input names"
                required: false
                type: string
                default: ""
            auto-merge:
                description: "Enable auto-merge for update PRs"
                required: false
                type: boolean
                default: true
            pr-labels:
                description: "Comma-separated PR labels"
                required: false
                type: string
                default: "dependencies,automated"
        secrets:
            BOT_APP_ID:
                required: true
            BOT_PRIVATE_KEY:
                required: true
            CACHIX_AUTH_TOKEN:
                required: false

permissions:
    contents: write
    pull-requests: write
    statuses: write

concurrency:
    group: updates-${{ github.ref }}
    cancel-in-progress: false

jobs:
    discover:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.discover.outputs.matrix }}
            has-updates: ${{ steps.discover.outputs.has-updates }}
        steps:
            - uses: actions/checkout@v4

            - uses: cachix/install-nix-action@v31

            - id: discover
              env:
                  PACKAGES: ${{ inputs.packages }}
                  INPUTS: ${{ inputs.inputs }}
              run: .github/ci/discovery.sh

    update:
        needs: discover
        if: needs.discover.outputs.has-updates == 'true'
        runs-on: ${{ matrix.runs_on }}
        env:
            CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ steps.app-token.outputs.token }}

            - uses: cachix/cachix-action@v17
              if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
              with:
                  name: auxera
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "auxera-updater[bot]"
                  git config user.email "${{ secrets.BOT_APP_ID }}+auxera-updater[bot]@users.noreply.github.com"

            - name: Perform update
              id: perform
              env:
                  SYSTEM: ${{ matrix.system }}
                  CURRENT_VERSION: ${{ matrix.current_version }}
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  .github/ci/update.sh "${{ matrix.type }}" "${{ matrix.name }}"

            - name: Upload update artifact
              if: steps.perform.outputs.updated == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.perform.outputs.artifact_name }}
                  path: ${{ steps.perform.outputs.artifact_dir }}
                  if-no-files-found: error

    create-prs:
        needs:
            - discover
            - update
        if: needs.discover.outputs.has-updates == 'true' && needs.update.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}

            - name: Download update artifacts
              uses: actions/download-artifact@v4
              with:
                  path: .github/ci/downloaded-artifacts

            - name: Configure git
              run: |
                  git config user.name "auxera-updater[bot]"
                  git config user.email "${{ secrets.BOT_APP_ID }}+auxera-updater[bot]@users.noreply.github.com"

            - name: Create consolidated pull requests
              env:
                  SYSTEM: ${{ matrix.system }}
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  PR_LABELS: ${{ inputs.pr-labels }}
                  AUTO_MERGE: ${{ inputs.auto-merge }}
              run: |
                  bash .github/ci/collect-and-create-prs.sh
