name: Build And Publish

on:
  merge_group:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    uses: ./.github/workflows/discover.yml
    with:
      changed-only: true

  build:
    needs:
      - discover
    if: needs.discover.outputs.package-matrix != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.package-matrix) }}
    runs-on: ${{ matrix.system == 'aarch64-darwin' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: auxera
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and push changed package
        run: nix build --print-build-logs ".#packages.${{ matrix.system }}.${{ matrix.package }}"
