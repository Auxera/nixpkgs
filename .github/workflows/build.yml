name: Build And Publish

on:
    push:
        branches: [main]

concurrency:
    group: build-publish-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                system: [x86_64-linux]
        steps:
            - uses: actions/checkout@v4

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            - uses: cachix/cachix-action@v16
              with:
                  name: auxera
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

            - name: Build package outputs
              run: |
                  nix eval --raw .#packages.${{ matrix.system }} \
                    --apply 'pkgs: builtins.concatStringsSep "\n" (map (name: ".#packages.${{ matrix.system }}.${name}") (builtins.attrNames pkgs))' \
                    | xargs -r nix build --print-build-logs --system ${{ matrix.system }}
