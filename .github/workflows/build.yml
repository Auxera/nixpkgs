name: Build And Publish

on:
    merge_group:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: build-publish-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    discover:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.discover.outputs.matrix }}
            has-changes: ${{ steps.discover.outputs.has-changes }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Get changed packages
              id: discover
              run: .github/scripts/discover-changed-packages.sh

    build:
        needs: discover
        if: needs.discover.outputs.has-changes == 'true'
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            - uses: cachix/cachix-action@v17
              with:
                  name: auxera
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
                  pushFilter: |
                      !**/*.drv

            - name: Build ${{ matrix.package }}
              run: |
                  nix build --print-build-logs ".#packages.${{ matrix.system }}.${{ matrix.package }}"
