name: CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Alejandra format check
        run: nix run nixpkgs#alejandra -- --check .

  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Flake checks
        run: nix flake check --all-systems --print-build-logs

  discover:
    needs:
      - fmt
      - flake-check
    uses: ./.github/workflows/discover.yml
    with:
      changed-only: true

  test_build:
    needs:
      - discover
    if: needs.discover.outputs.package-matrix != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.package-matrix) }}
    runs-on: ${{ matrix.platform == 'aarch64-darwin' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: auxera
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Build changed package
        run: nix build --print-build-logs ".#packages.${{ matrix.platform }}.${{ matrix.package }}"
