name: CI

on:
    pull_request:

permissions:
    statuses: write
    pull-requests: write

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    fmt:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31

            - name: Alejandra format check
              run: nix run nixpkgs#alejandra -- --check .

    flake-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31

            - name: Flake checks
              run: nix flake check --all-systems --print-build-logs

    discover:
        needs:
            - fmt
            - flake-check
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.discover.outputs.matrix }}
            has-changes: ${{ steps.discover.outputs.has-changes }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: cachix/install-nix-action@v31

            - id: discover
              run: |
                  CHANGED_FILES="$(git diff --name-only origin/main...HEAD | tr '\n' ' ')"
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts discover-build-targets --changed-files "$CHANGED_FILES"

    test_build:
        needs:
            - discover
        if: needs.discover.outputs.has-changes == 'true'
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
        runs-on: ${{ matrix.runs_on }}
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31

            - name: Build changed package
              run: nix build --print-build-logs ".#packages.${{ matrix.system }}.${{ matrix.package }}"
