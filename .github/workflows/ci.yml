name: CI

on:
    pull_request:
    merge_group:
        branches: [main]

permissions:
    statuses: write
    pull-requests: write

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    fmt:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            - name: Alejandra format check
              run: nix run nixpkgs#alejandra -- --check .

    flake-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            - name: Flake checks
              run: nix flake check --print-build-logs

    build:
        needs:
            - fmt
            - flake-check
        strategy:
            fail-fast: false
            matrix:
                include:
                    - system: x86_64-linux
                      runs-on: ubuntu-latest
                    - system: aarch64-linux
                      runs-on: ubuntu-24.04-arm
                    - system: aarch64-darwin
                      runs-on: macos-14
        runs-on: ${{ matrix.runs-on }}
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            - name: Build package outputs
              run: |
                  system="${{ matrix.system }}"
                  expr="pkgs: builtins.concatStringsSep \"\\n\" (map (name: \".#packages.${system}.\" + name) (builtins.attrNames pkgs))"
                  nix eval --raw ".#packages.${system}" --apply "$expr" | xargs -r nix build --print-build-logs --system "$system"
