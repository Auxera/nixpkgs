name: Update Dependencies

on:
    schedule:
        - cron: "0 3 * * *"
    workflow_dispatch:
        inputs:
            packages:
                description: "Space-separated package names (empty means all)"
                required: false
                default: ""
            hash-refresh:
                description: "Recompute hashes at current version without bumping"
                required: false
                default: "false"
                type: boolean
            auto-merge:
                description: "Enable PR auto-merge"
                required: false
                default: "true"

permissions:
    contents: write
    pull-requests: write

jobs:
    discover:
        runs-on: ubuntu-latest
        outputs:
            apply_matrix: ${{ steps.discover.outputs.apply_matrix }}
            hash_matrix: ${{ steps.discover.outputs.hash_matrix }}
            has-updates: ${{ steps.discover.outputs.has-updates }}
        steps:
            - uses: actions/checkout@v6

            - uses: cachix/install-nix-action@v31

            - id: discover
              env:
                  PACKAGES: ${{ github.event.inputs.packages || '' }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ARGS="discover-updates --packages \"$PACKAGES\""
                  if [ "${{ github.event.inputs.hash-refresh }}" = "true" ]; then
                    ARGS="$ARGS --hash-refresh"
                  fi
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts $ARGS

    apply:
        needs: discover
        if: needs.discover.outputs.has-updates == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.apply_matrix) }}
        steps:
            - uses: actions/create-github-app-token@v2
              id: bot-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  token: ${{ steps.bot-token.outputs.token }}

            - uses: cachix/install-nix-action@v31

            - uses: cachix/cachix-action@v17
              with:
                  name: auxera
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

            - id: apply
              if: matrix.type == 'package'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GIT_AUTHOR_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_AUTHOR_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GIT_COMMITTER_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_COMMITTER_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GH_TOKEN: ${{ steps.bot-token.outputs.token }}
              run: |
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts apply-update \
                    --type "${{ matrix.type }}" \
                    --name "${{ matrix.name }}" \
                    --current-version "${{ matrix.current_version }}" \
                    --latest-version "${{ matrix.latest_version }}" \
                    --owner "${{ matrix.owner }}" \
                    --repo "${{ matrix.repo }}" \
                    --systems-needing-output-hash "${{ matrix.systems_needing_output_hash }}" \
                    ${{ github.event.inputs.hash-refresh == 'true' && '--hash-refresh' || '' }}

            - id: apply-flake
              if: matrix.type == 'flake-input'
              env:
                  GIT_AUTHOR_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_AUTHOR_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GIT_COMMITTER_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_COMMITTER_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
              run: |
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts apply-update \
                    --type "${{ matrix.type }}" \
                    --name "${{ matrix.name }}" \
                    --current-version "${{ matrix.current_version }}" \
                    --latest-version "${{ matrix.latest_version }}"

    compute-output-hash:
        needs: apply
        if: needs.discover.outputs.hash_matrix != '{"include":[]}'
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.hash_matrix) }}
        steps:
            - uses: actions/create-github-app-token@v2
              id: bot-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  token: ${{ steps.bot-token.outputs.token }}

            - uses: cachix/install-nix-action@v31

            - uses: cachix/cachix-action@v17
              with:
                  name: auxera
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

            - run: |
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts compute-output-hash \
                    --name "${{ matrix.name }}" \
                    --system "${{ matrix.system }}" \
                    --branch "${{ matrix.branch }}"

            - uses: actions/upload-artifact@v4
              with:
                  name: output-hash-${{ matrix.name }}-${{ matrix.system }}
                  path: pkgs/${{ matrix.name }}/output-hashes/${{ matrix.system }}.txt
                  if-no-files-found: warn

    finalize-pr:
        needs:
            - discover
            - apply
            - compute-output-hash
        if: always() && needs.apply.result != 'skipped' && needs.apply.result != 'failure'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.discover.outputs.apply_matrix) }}
        steps:
            - uses: actions/create-github-app-token@v2
              id: bot-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  token: ${{ steps.bot-token.outputs.token }}

            - uses: cachix/install-nix-action@v31

            - uses: actions/download-artifact@v4
              if: matrix.systems_needing_output_hash != ''
              with:
                  path: .tmp/output-hashes
                  pattern: output-hash-${{ matrix.name }}-*

            - env:
                  GIT_AUTHOR_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_AUTHOR_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GIT_COMMITTER_NAME: ${{ steps.bot-token.outputs.app-slug }}[bot]
                  GIT_COMMITTER_EMAIL: ${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GH_TOKEN: ${{ steps.bot-token.outputs.token }}
              run: |
                  git config user.name "${GIT_AUTHOR_NAME}"
                  git config user.email "${GIT_AUTHOR_EMAIL}"
                  nix run nixpkgs#bun -- tools/update-cli/src/main.ts finalize-pr \
                    --type "${{ matrix.type }}" \
                    --name "${{ matrix.name }}" \
                    --branch "${{ matrix.branch }}" \
                    --current-version "${{ matrix.current_version }}" \
                    --new-version "${{ matrix.latest_version }}" \
                    --artifact-root .tmp/output-hashes \
                    --auto-merge "${{ github.event.inputs.auto-merge || 'true' }}" \
                    --labels "dependencies automated"
