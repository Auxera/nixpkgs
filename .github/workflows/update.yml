name: Update Dependencies

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package names (empty means all)"
        required: false
        default: ""
      auto-merge:
        description: "Enable PR auto-merge"
        required: true
        default: true
        type: boolean

jobs:
  discover:
    uses: ./.github/workflows/discover.yml

  update-flake:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        input: ${{ fromJson(needs.discover.outputs.flake-inputs || '[]') }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bot
        id: bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: auxera
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: update
        run: |
          nix flake update ${{ matrix.input }}

      - uses: ./.github/actions/commit-and-pr
        name: Commit changes and create PR
        with:
          branch: "update/${{ matrix.input }}"
          title: "flake.lock: update ${{ matrix.input }}"
          body: 'Automated update of input "${{ matrix.input }}"'
          bot-token: ${{ steps.bot-token.outputs.token }}

  update-package:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages || '[]') }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bot
        id: bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: auxera
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: update
        name: Perform update with nix-update
        env:
          NIX_PATH: nixpkgs=channel:nixos-unstable
        run: |
          nix develop -c bash -c '
            nix-update ${{ matrix.package }} --flake -u --write-commit-message="/tmp/full.txt"
            head -n1 /tmp/full.txt > /tmp/first.txt
            echo "message-short=$(cat /tmp/first.txt)" >> $GITHUB_OUTPUT
            echo "message-long<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/full.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          '

      - uses: ./.github/actions/commit-and-pr
        name: Commit changes and create PR
        if: steps.update.outputs.message-short != ''
        with:
          branch: "update/${{ matrix.package }}"
          title: ${{ steps.update.outputs.message-short }}
          body: ${{ steps.update.outputs.message-long }}
          bot-token: ${{ steps.bot-token.outputs.token }}
